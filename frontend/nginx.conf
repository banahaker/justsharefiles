server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Download page: rewrite all /d/<id>/ requests to the static shell at
    # /d/_/index.html. The client component reads the real ID via useParams().
    location ~ ^/d/[^/]+/? {
        try_files $uri $uri/index.html /d/_/index.html;
    }

    # Serve static files, fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
